name: nutribalance-mcp
displayName: NutriBalance
description: "Free nutrition tools for AI assistants — calculate TDEE & personalised macros, look up food nutrition data, generate meal plans (standard, vegetarian, vegan, keto, high-protein), fix nutrient deficiencies with food & supplement guidance, and score a day's eating from 0–100."
homepage: https://thenutritrackerapp-creator-nutribal.vercel.app
icon: https://raw.githubusercontent.com/thenutritrackerapp-creator/nutribalance-mcp/master/icon.png
configSchema:
  type: object
  properties:
    units:
      type: string
      enum:
        - metric
        - imperial
      description: "Preferred unit system for weight and height values. metric = kg/cm, imperial = lbs/inches (default: metric)"
      default: metric
    default_goal:
      type: string
      enum:
        - lose
        - maintain
        - gain
      description: "Default fitness goal used when not specified in tool calls: lose weight, maintain weight, or gain muscle (default: maintain)"
      default: maintain
    response_detail:
      type: string
      enum:
        - standard
        - concise
      description: "Response verbosity — standard includes tips and context, concise returns numbers only (default: standard)"
      default: standard
  additionalProperties: false
startCommand:
  type: http
  url: https://thenutritrackerapp-creator-nutribalance-cv4tvu4k2.vercel.app/api/mcp
